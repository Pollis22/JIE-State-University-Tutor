<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" width="200" height="240">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D4161E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C5050C;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="innerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#A00409;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B0308;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Shield shape -->
  <path d="M100 8 L188 40 L188 130 Q188 190 100 232 Q12 190 12 130 L12 40 Z" 
        fill="url(#shieldGrad)" stroke="#8B0308" stroke-width="3"/>
  <!-- Inner shield border -->
  <path d="M100 20 L178 48 L178 128 Q178 183 100 222 Q22 183 22 128 L22 48 Z" 
        fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.4"/>
  <!-- Inner shield -->
  <path d="M100 28 L170 53 L170 126 Q170 177 100 214 Q30 177 30 126 L30 53 Z" 
        fill="url(#innerGrad)" opacity="0.3"/>
  <!-- Book icon -->
  <g transform="translate(100, 85)" fill="#FFFFFF" opacity="0.95">
    <!-- Left page -->
    <path d="M-4 -22 L-4 18 Q-4 20 -6 20 L-32 20 Q-34 20 -34 18 L-34 -12 Q-34 -14 -32 -15 L-6 -24 Q-4 -24.5 -4 -22 Z" />
    <!-- Right page -->
    <path d="M4 -22 L4 18 Q4 20 6 20 L32 20 Q34 20 34 18 L34 -12 Q34 -14 32 -15 L6 -24 Q4 -24.5 4 -22 Z" />
    <!-- Center spine -->
    <rect x="-2" y="-24" width="4" height="46" rx="1" fill="#C5050C"/>
    <!-- Page lines left -->
    <line x1="-10" y1="-10" x2="-28" y2="-4" stroke="#C5050C" stroke-width="1.5" opacity="0.4"/>
    <line x1="-10" y1="-2" x2="-28" y2="4" stroke="#C5050C" stroke-width="1.5" opacity="0.4"/>
    <line x1="-10" y1="6" x2="-28" y2="12" stroke="#C5050C" stroke-width="1.5" opacity="0.4"/>
    <!-- Page lines right -->
    <line x1="10" y1="-10" x2="28" y2="-4" stroke="#C5050C" stroke-width="1.5" opacity="0.4"/>
    <line x1="10" y1="-2" x2="28" y2="4" stroke="#C5050C" stroke-width="1.5" opacity="0.4"/>
    <line x1="10" y1="6" x2="28" y2="12" stroke="#C5050C" stroke-width="1.5" opacity="0.4"/>
  </g>
  <!-- Torch/flame above book -->
  <g transform="translate(100, 48)" fill="#FFD700" opacity="0.9">
    <path d="M0 -10 Q8 -5 5 5 Q3 10 0 8 Q-3 10 -5 5 Q-8 -5 0 -10 Z"/>
    <path d="M0 -6 Q4 -3 3 2 Q1 5 0 4 Q-1 5 -3 2 Q-4 -3 0 -6 Z" fill="#FFF3B0"/>
  </g>
  <!-- Laurel left -->
  <g transform="translate(40, 155)" fill="#FFFFFF" opacity="0.35">
    <ellipse cx="0" cy="0" rx="5" ry="10" transform="rotate(-30)"/>
    <ellipse cx="-5" cy="-15" rx="4" ry="9" transform="rotate(-20)"/>
    <ellipse cx="-8" cy="-30" rx="4" ry="8" transform="rotate(-10)"/>
    <ellipse cx="-6" cy="-45" rx="3" ry="7" transform="rotate(0)"/>
  </g>
  <!-- Laurel right -->
  <g transform="translate(160, 155)" fill="#FFFFFF" opacity="0.35">
    <ellipse cx="0" cy="0" rx="5" ry="10" transform="rotate(30)"/>
    <ellipse cx="5" cy="-15" rx="4" ry="9" transform="rotate(20)"/>
    <ellipse cx="8" cy="-30" rx="4" ry="8" transform="rotate(10)"/>
    <ellipse cx="6" cy="-45" rx="3" ry="7" transform="rotate(0)"/>
  </g>
  <!-- "SU" monogram -->
  <text x="100" y="150" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" 
        font-size="48" font-weight="bold" fill="#FFFFFF" letter-spacing="4">SU</text>
  <!-- "STATE UNIVERSITY" text -->
  <text x="100" y="178" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" 
        font-size="12" fill="#FFFFFF" letter-spacing="3" font-weight="normal" opacity="0.85">STATE UNIVERSITY</text>
</svg>
